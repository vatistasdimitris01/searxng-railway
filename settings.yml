use_default_settings: true

general:
  instance_name: "Cipher"

server:
  bind_address: "0.0.0.0"
  port: 8080
  secret_key: "change_this_to_any_random_string_12345"

search:
  safe_search: 0
  formats:
    - html
    - json

engines:
  - name: google
  - name: google suggestions
    disabled: true

ui:
  default_locale: en
  query_in_title: true
  default_theme: simple
  theme_args:
    simple_style: light
  center_alignment: true
  url_formatting: pretty

categories_as_tabs: {}