use_default_settings: true

general:
  instance_name: "Cipher Search"

server:
  bind_address: 0.0.0.0
  port: 8080
  secret_key: "CHANGE_THIS_TO_A_RANDOM_LONG_STRING"
  base_url: false

search:
  safe_search: 0
  formats:
    - html
    - json

engines:
  - name: google
    disabled: false

  - name: google suggestions
    disabled: true

  - name: wikidata
    disabled: true   # fixes your crash

ui:
  default_locale: en
  query_in_title: true
  default_theme: simple

  theme_args:
    simple_style: dark

  center_alignment: true
  url_formatting: pretty

# REQUIRED for proxy deployments
outgoing:
  request_timeout: 5.0
  max_request_timeout: 10.0

redis:
  url: false

categories_as_tabs: {}
